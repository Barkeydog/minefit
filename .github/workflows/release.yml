name: Release

on:
  push:
    tags:
      - "v*"
      - "!v*-mac"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish, for example v0.7.5"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY: minefit
  RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform_id: linux-x64-gnu
            package_dir: barkey-minefit-linux-x64-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            platform_id: darwin-x64
            package_dir: barkey-minefit-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform_id: darwin-arm64
            package_dir: barkey-minefit-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform_id: win32-x64-msvc
            package_dir: barkey-minefit-win32-x64-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build minefit
        run: cargo build --release -p minefit --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          TAG="${RELEASE_TAG}"
          ASSET_NAME="${BINARY}-${TAG}-${{ matrix.target }}"
          STAGING="${RUNNER_TEMP}/${ASSET_NAME}"
          mkdir -p "${STAGING}"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            EXE_EXT=".exe"
            ARCHIVE_EXT=".zip"
            cp "target/${{ matrix.target }}/release/${BINARY}${EXE_EXT}" "${STAGING}/"
            cp README.md LICENSE "${STAGING}/" 2>/dev/null || true
            cd "${RUNNER_TEMP}"
            7z a "${ASSET_NAME}${ARCHIVE_EXT}" "${ASSET_NAME}"
          else
            EXE_EXT=""
            ARCHIVE_EXT=".tar.gz"
            cp "target/${{ matrix.target }}/release/${BINARY}${EXE_EXT}" "${STAGING}/"
            cp README.md LICENSE "${STAGING}/" 2>/dev/null || true
            cd "${RUNNER_TEMP}"
            tar czf "${ASSET_NAME}${ARCHIVE_EXT}" "${ASSET_NAME}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ASSET_NAME}${ARCHIVE_EXT}" | awk '{print $1 "  " $2}' > "${ASSET_NAME}${ARCHIVE_EXT}.sha256"
          else
            shasum -a 256 "${ASSET_NAME}${ARCHIVE_EXT}" | awk '{print $1 "  " $2}' > "${ASSET_NAME}${ARCHIVE_EXT}.sha256"
          fi

          echo "ASSET=${ASSET_NAME}${ARCHIVE_EXT}" >> "$GITHUB_ENV"
          echo "ASSET_PATH=${RUNNER_TEMP}/${ASSET_NAME}${ARCHIVE_EXT}" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=${RUNNER_TEMP}/${ASSET_NAME}${ARCHIVE_EXT}.sha256" >> "$GITHUB_ENV"

      - name: Build npm platform package
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY_PATH="target/${{ matrix.target }}/release/${BINARY}.exe"
          else
            BINARY_PATH="target/${{ matrix.target }}/release/${BINARY}"
          fi

          node scripts/build-platform-package.js "${{ matrix.platform_id }}" "${BINARY_PATH}"

      - name: Upload release asset
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}

      - name: Upload npm package directory
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm-${{ matrix.package_dir }}
          path: npm/${{ matrix.package_dir }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts
          pattern: minefit-v*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256

  publish-npm:
    needs: [build, release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag version matches package version
        shell: bash
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "::error::Tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Download npm platform packages
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: npm-artifacts
          pattern: npm-*

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          find npm-artifacts -mindepth 2 -maxdepth 2 -type f -name package.json -print0 | while IFS= read -r -d '' package_json; do
            dir="$(dirname "${package_json}")"
            echo "Publishing ${dir}"
            npm publish "./${dir}" --access public
          done

      - name: Publish top-level npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
